#gridhero{
	display: grid;
	height: 100vh;
	grid:

}

	grid-area:logo;
	color: white;
	display: flex;
	align-items: center;
	font-size: 30px;
	font-family: Courier;
}
.topbar {
	grid-area: topbar;
	background-image: linear-gradient(to right, #70223b, #6e3c16, #234036, #233940, #40232c);
	display: grid;
	grid:
	'gap logo gapnav navbar gap2'1fr
	/1fr 4fr 1fr 9fr 1fr;
}
#gap{
	grid-area: gap;
}
#gapnav{
	grid-area: gapnav;
	/*background-color: #256130;
	border-bottom: 4px solid #004200;*/
}
#gap2{
	grid-area: gap2;
}
.navbar{
	grid-area: navbar;

.arrow{
	border: solid white;
	border-width: 0 3px 3px 0;
	display: inline-block;
	padding: 3px;
}
.down{
	transform: rotate(45deg);
	-webkit-transform: rotate(45deg);
}

.navbar{
	overflow: hidden;
}
.navbar .link{
	float: right;
	font-size: 20px;
	font-family: Courier;
	color: #FFFFA9;
	text-align: center;
	padding: 14px 16px;
	text-decoration: none;
}
.dropdown{
	float: right;
	overflow: hidden;
}

.dropdown .dropbtn{
	font-size: 20px;
	border: none;
	outline: none;
	color: #FFFFA9;
	padding: 14px 16px;
	font-family: Courier;
	margin: 0;
	background-color: transparent;

}
.navbar .link:hover, .dropdown:hover .dropbtn{
	background-color: blue;
}

.dropdown-content {
	display: none;
	position: absolute;
	min-width: 160px;
	overflow: auto;
	border: 10px solid transparent;
	border-image: conic-gradient(#FF00AA, #FFA902, #AAFF02, #05AAFF, #AA01FF);

	box-shadow: 0px 8px 16px #6902db;
	z-index: 1;
}

.dropdown-content a{
	float: none;
	color: black;
	background-color: white;
	outline: 1px solid green;
	padding: 14px;
	text-decoration: none;
	display: block;
	text-align: left;
}
.dropdown-content .aboutc:hover{
	background-color: #692008;
	color: white;
}
.dropdown-content .sheets:hover{
	background-color: blue;
	color: white;
}

.dropdown:hover .dropdown-content{
	display: block;
}

</style>

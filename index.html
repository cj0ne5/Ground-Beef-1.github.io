<!DOCTYPE html>

<head>
	<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
body{background-color: #000000;
	margin: 0;
	padding: 0;
}
body {
	overflow: overlay;
}

#about{
	background-color: black;
}
#works{
	color:white;
}
#gamelink{
	color: white;
	text-decoration: underline;
	background-color: transparent;
}

#gamelink:hover{
	color: #FFFFA9;
	text-decoration: underline;
	background-color: transparent;
}
#gridhero{
	display: grid;
	height: 100vh;
	grid:
'navbar'1fr
'main'13fr
	/1fr;
}
.arrow{
	border: solid white;
	border-width: 0 3px 3px 0;
	display: inline-block;
	padding: 3px;
}
.down{
	transform: rotate(45deg);
	-webkit-transform: rotate(45deg);
}

.navbar{
	grid-area: navbar;
	overflow: hidden;
	background-image: linear-gradient(to right, #70223b, #6e3c16, #234036, #233940, #40232c);
	background-color: transparent;
	position: fixed;
	top: 0;
	height: 60px;
	width: 100%;
	z-index: 2;
}
.navbar .link{
	float: right;
	font-size: 20px;
	font-family: Courier;
	color: #FFFFA9;
	text-align: center;
	padding: 18px 16px;
	text-decoration: none;
}
.noscroll::-webkit-scrollbar {
    display: none;
}

.noscroll {
  -ms-overflow-style: none;
  scrollbar-width: none;  
}

.dropdown{
	float: right;
	overflow: hidden;
}

.dropdown .dropbtn{
	font-size: 20px;
	border: none;
	outline: none;
	color: #FFFFA9;
	padding: 18px 16px;
	font-family: Courier;
	margin: 0;
	background-color: transparent;

}
.navbar .link:hover, .dropdown:hover .dropbtn{
	background-color: blue;
}

.dropdown-background{
	min-width: 160px;
	display: none;
	position: fixed;
	background-image: conic-gradient(#FF00AA, #FFA902, #AAFF02, #05AAFF, #AA01FF);
	box-shadow: 0px 8px 16px #6902db;
}

.dropdown-content {
	width: 90%;
	margin: 10px;
	overflow: auto;
	z-index: 3;
}

.dropdown-content a{
	float: none;
	color: black;
	background-color: white;
	padding: 14px;
	text-decoration: none;
	display: block;
	text-align: left;
}
.dropdown-content .aboutc:hover{
	background-color: black;
	color: white;
}
.dropdown-content .sheets:hover{
	background-color: black;
	color: white;
}

.dropdown:hover .dropdown-background{
	display: block;
}
.dropdown-content .colorline{
	width:160px;
	height: 2px;
	background-color: black;
	background-image: linear-gradient(to left, #FF00AA, #FFA902, #AAFF02, #05AAFF, #AA01FF);
}

.dropdown #topborder{
	width:10px;
	height: 4px;
	background-color: transparent;
}
#hero{
        text-align: center;
        padding: 16px;
        margin-top: 60px;
        grid-area: main;
        font-size: 50px;
	position: relative;
	z-index:1;
        background-color: transparent;
        background-image: linear-gradient(to bottom,#000011, #212127)
}
#otworks{
	padding-right:40px;
}


</style>

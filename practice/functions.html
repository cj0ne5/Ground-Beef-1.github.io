<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Functions</title>
	</head>
	<body>
		<h1>Functions</h1>
		<script>
		console.log("test"); //call (or execute) it

		//we can make our own functions
		function sayHi(){
			console.log("hi");
		}

		sayHi(); //<-- executed it!
		

		//functions can take input
		function sayHiToSomeone(who){
			console.log("hi "+who);
		}

		sayHiToSomeone("Me");
		sayHiToSomeone("Myself");

		//functions can take multiple inputs

		function sayHiToTwoPeople(who1, who2){
			console.log("hi " + who1 + " and " + who2);
		}

		sayHiToTwoPeople("thing1","thing2")

		//interesting (I'm scared(I heard metion of my nemesis, canvas))
		

		</script>
	</body>
</html>
